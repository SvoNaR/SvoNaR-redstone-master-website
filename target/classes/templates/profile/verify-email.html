<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="page page--auth">
	<div class="auth-center auth-center--wide">
		<h1 th:text="${pageTitle}">Подтверждение почты</h1>

		<section class="profile-card verify-email-card">
			<div class="verify-email-preview">
				<img class="profile-avatar profile-avatar--image profile-avatar--large"
					 th:src="${profileUser.avatarUrl()}" th:alt="${profileUser.username()}" width="64" height="64"/>
				<p class="profile-username" th:text="${profileUser.username()}">user</p>
			</div>

			<div class="alert alert--success" th:if="${resent}">
				<p th:text="${locale.code == 'en'
					? 'Confirmation email sent again. Check your inbox.'
					: 'Письмо с подтверждением отправлено повторно. Проверьте почту.'}"></p>
			</div>

			<p th:if="${emailChanged}" th:text="${locale.code == 'en'
				? 'Your email has been updated. We sent a confirmation email to:'
				: 'Почта изменена. На новый адрес отправлено письмо с подтверждением:'}"></p>
			<p th:unless="${emailChanged}" th:text="${locale.code == 'en'
				? 'Your account has been created. We sent a confirmation email to:'
				: 'Аккаунт создан. На почту отправлено письмо с подтверждением:'}"></p>
			<p class="verify-email-address" th:text="${profileUser.email()}"></p>
			<p th:text="${locale.code == 'en'
				? 'Open the link in the email to verify your address. The link is valid for 24 hours.'
				: 'Перейдите по ссылке в письме, чтобы подтвердить адрес. Ссылка действует 24 часа.'}"></p>

			<p th:if="${verificationUrl}" class="verify-dev-link muted"
			   th:text="${locale.code == 'en'
				? 'SMTP is off — dev link:'
				: 'SMTP отключён — ссылка для разработки:'}"></p>
			<p th:if="${verificationUrl}" class="verify-dev-link">
				<a th:href="${verificationUrl}" th:text="${verificationUrl}"></a>
			</p>

			<form th:action="@{/profile/resend-verification}" method="post" class="verify-email-actions">
				<input type="hidden" name="lang" th:value="${locale.code}"/>
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
				<button type="submit" class="btn btn--secondary"
						th:text="${locale.code == 'en' ? 'Resend email' : 'Отправить письмо снова'}"></button>
			</form>

			<a class="btn btn--primary btn--block" th:href="@{/profile(lang=${locale.code})}"
			   th:text="${locale.code == 'en' ? 'Go to profile' : 'Перейти в профиль'}"></a>
		</section>
	</div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
