spring.application.name=redstone-master-web
server.port=${PORT:8080}

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

spring.datasource.url=jdbc:h2:file:./data/redstone-web;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false

app.base-url=http://localhost:8080

# Учётные данные администратора и SMTP — в application-local.properties (не в Git)
app.admin.username=admin
app.admin.email=admin@redstone-master.local

# Подтверждение почты (Gmail SMTP)
app.mail.enabled=true
app.mail.from=redstone.master.dev@gmail.com
app.mail.from-name=Redstone Master
app.mail.sendgrid.api-key=

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=redstone.master.dev@gmail.com
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# Локальные секреты: application-local.properties в корне проекта (см. run.bat)

spring.servlet.multipart.max-file-size=256MB
spring.servlet.multipart.max-request-size=256MB

app.moderation.workspace-dir=./data/moderation/workspaces
app.moderation.jar-output-dir=./data/moderation/jars
app.moderation.ffmpeg-executable=ffmpeg
app.moderation.video-fps=15
app.moderation.video-width=854
app.moderation.video-height=480

app.avatars.user-dir=./data/avatars/users
