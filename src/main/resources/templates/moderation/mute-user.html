<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="page">
	<h1 th:text="${pageTitle}">Мьют пользователя</h1>

	<div th:replace="~{fragments/moderation :: nav}"></div>

	<div class="alert alert--success" th:if="${successMessage}" th:text="${successMessage}"></div>
	<div class="alert alert--error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

	<section class="profile-card">
		<h2 th:text="${locale.code == 'en' ? 'Comment mute' : 'Мьют комментариев'}">Мьют комментариев</h2>
		<p class="muted" th:text="${locale.code == 'en'
			? 'Restrict a user from posting lesson comments for a number of minutes. They will receive a notification with the reason.'
			: 'Запретите пользователю оставлять комментарии к урокам на указанное число минут. Ему придёт уведомление с причиной.'}"></p>

		<form class="moderation-form" method="post" th:action="@{/moderation/mute-user}">
			<input type="hidden" name="lang" th:value="${locale.code}"/>
			<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
			<label>
				<span th:text="${locale.code == 'en' ? 'Username' : 'Никнейм'}">Никнейм</span>
				<input type="text" name="username" required maxlength="32"/>
			</label>
			<label>
				<span th:text="${locale.code == 'en' ? 'Duration (minutes)' : 'Длительность (минут)'}">Длительность</span>
				<input type="number" name="minutes" min="1" max="10080" value="60" required/>
			</label>
			<label>
				<span th:text="${locale.code == 'en' ? 'Reason' : 'Причина'}">Причина</span>
				<textarea name="reason" rows="3" required maxlength="500"></textarea>
			</label>
			<div class="moderation-form__actions">
				<button type="submit" class="btn btn--primary"
						th:text="${locale.code == 'en' ? 'Apply mute' : 'Применить мьют'}">Применить мьют</button>
			</div>
		</form>
	</section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
