<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="page">
	<h1 th:text="${pageTitle}">Снять мьют с пользователя</h1>

	<div th:replace="~{fragments/moderation :: nav}"></div>

	<div class="alert alert--success" th:if="${successMessage}" th:text="${successMessage}"></div>
	<div class="alert alert--error" th:if="${errorMessage}" th:text="${errorMessage}"></div>

	<section class="profile-card">
		<h2 th:text="${locale.code == 'en' ? 'Active mutes' : 'Активные мьюты'}">Активные мьюты</h2>
		<p class="muted" th:text="${locale.code == 'en'
			? 'Users with an active comment mute. Removing the mute restores their ability to post comments.'
			: 'Пользователи с активным мьютом комментариев. Снятие мьюта восстанавливает возможность оставлять комментарии.'}"></p>

		<div class="table-scroll" th:if="${!mutedUsers.isEmpty()}">
			<table class="data-table admin-table admin-table--mutes">
				<colgroup>
					<col class="mute-col-username"/>
					<col class="mute-col-email"/>
					<col class="mute-col-date"/>
					<col class="mute-col-reason"/>
					<col class="mute-col-muted-by"/>
					<col class="mute-col-action"/>
				</colgroup>
				<thead>
				<tr>
					<th th:text="${locale.code == 'en' ? 'Username' : 'Никнейм'}">Никнейм</th>
					<th th:text="${locale.code == 'en' ? 'Email' : 'Почта'}">Почта</th>
					<th class="mute-table__date-head"
						th:text="${locale.code == 'en' ? 'Until (UTC)' : 'До (UTC)'}">До (UTC)</th>
					<th th:text="${locale.code == 'en' ? 'Reason' : 'Причина'}">Причина</th>
					<th th:text="${locale.code == 'en' ? 'Muted by' : 'Замьючен'}">Замьючен</th>
					<th></th>
				</tr>
				</thead>
				<tbody>
				<tr th:each="entry : ${mutedUsers}">
					<td th:text="${entry.username()}"></td>
					<td class="mute-table__email" th:text="${entry.email()}" th:attr="title=${entry.email()}"></td>
					<td class="mute-table__date"
						th:text="${#temporals.format(entry.mutedUntil(), 'dd.MM.yyyy HH:mm')}"
						th:attr="title=${#temporals.format(entry.mutedUntil(), 'dd.MM.yyyy HH:mm') + ' UTC'}"></td>
					<td class="mute-table__reason" th:text="${entry.reason()}" th:attr="title=${entry.reason()}"></td>
					<td th:text="${entry.mutedByUsername()}"></td>
					<td>
						<form th:action="@{/moderation/unmute-user}" method="post" class="inline-form"
							  th:attr="data-confirm-message=${locale.code == 'en'
							  	? 'Remove comment mute from user ' + entry.username() + '?'
							  	: 'Снять мьют комментариев с пользователя ' + entry.username() + '?'}">
							<input type="hidden" name="userId" th:value="${entry.userId()}"/>
							<input type="hidden" name="lang" th:value="${locale.code}"/>
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
							<button type="submit" class="btn btn--small btn--primary"
									th:text="${locale.code == 'en' ? 'Unmute' : 'Снять мьют'}"></button>
						</form>
					</td>
				</tr>
				</tbody>
			</table>
		</div>

		<p class="muted" th:if="${mutedUsers.isEmpty()}"
		   th:text="${locale.code == 'en'
		   	? 'No regular users are currently muted.'
		   	: 'Сейчас нет замьюченных обычных пользователей.'}"></p>
	</section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
