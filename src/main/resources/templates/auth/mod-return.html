<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>

<main class="page page--narrow">
	<h1 th:text="${pageTitle}">Вернуться в Minecraft</h1>
	<div class="profile-card">
		<p th:text="${locale.code == 'en'
			? 'Signed in as ' + username + '. Returning to the mod…'
			: 'Вы вошли как ' + username + '. Возвращаемся в мод…'}">
			Вы вошли. Возвращаемся в мод…
		</p>
		<p class="auth-hint"
		   th:text="${locale.code == 'en'
			? 'If Minecraft does not open automatically, click the button below.'
			: 'Если Minecraft не открылся автоматически, нажмите кнопку ниже.'}"></p>
		<a class="btn btn--primary" th:href="${callbackUrl}"
		   th:text="${locale.code == 'en' ? 'Open profile in mod' : 'Открыть профиль в моде'}">
			Открыть профиль в моде
		</a>
	</div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script th:inline="javascript">
	(function () {
		var callbackUrl = /*[[${callbackUrl}]]*/ '';
		if (callbackUrl) {
			window.location.replace(callbackUrl);
		}
	})();
</script>
</body>
</html>
