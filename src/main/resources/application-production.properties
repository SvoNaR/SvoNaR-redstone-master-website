# Профиль production (Railway, VPS). Секреты — через Variables окружения.

app.base-url=${APP_BASE_URL:https://redstone-master.ru}
app.admin.password=${APP_ADMIN_PASSWORD}

server.forward-headers-strategy=framework
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto

server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax

spring.thymeleaf.cache=true

spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:465}
spring.mail.username=${SPRING_MAIL_USERNAME:redstone.master.dev@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
app.mail.from=${APP_MAIL_FROM:${spring.mail.username}}
app.mail.from-name=Redstone Master

# Railway блокирует исходящий SMTP (порты 25/465/587). На production используйте SendGrid API.
app.mail.sendgrid.api-key=${SENDGRID_API_KEY:}
